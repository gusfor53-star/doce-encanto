<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Encanto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fafafa;
}

/* HEADER */
.header {
  background: white;
  text-align: center;
  padding: 30px 20px 10px;
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 10px;
}

/* NOME */
.brand {
  font-size: 28px;
  font-weight: 600;
  color: #e11d48;
}

/* SUB */
.sub {
  color: #999;
  font-size: 14px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px 20px;
}

.hero h1 {
  font-size: 24px;
  margin: 0;
}

.hero p {
  color: #777;
}

/* GRID */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.05);
}

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

.info {
  padding: 15px;
}

.nome {
  font-weight: 600;
}

.desc {
  font-size: 13px;
  color: #777;
  margin: 5px 0;
}

.preco {
  font-weight: 600;
  margin: 10px 0;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 30px;
  color: #888;
  font-size: 13px;
}
</style>

</head>

<body>

<!-- HEADER COM LOGO -->
<div class="header">

  <!-- USA ESSA IMAGEM COMO LOGO -->
  <img class="logo" src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

  <div class="brand">Doce Encanto</div>
  <div class="sub">Doces artesanais</div>

</div>

<!-- HERO -->
<div class="hero">
  <h1>Doces feitos com carinho 💖</h1>
  <p>Feito no dia • Entrega rápida</p>
</div>

<!-- PRODUTOS -->
<div class="container">
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606312619344-ff9d6c9c08b3">
      <div class="info">
        <div class="nome">Brownie Gourmet</div>
        <div class="desc">Casquinha crocante e interior macio</div>
        <div class="preco">R$12</div>
        <a href="https://wa.me/5512991956217">
          <button>Pedir</button>
        </a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
      <div class="info">
        <div class="nome">Bolo no Pote</div>
        <div class="desc">Cremoso e recheado</div>
        <div class="preco">R$10</div>
        <a href="https://wa.me/5512991956217">
          <button>Pedir</button>
        </a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">
      <div class="info">
        <div class="nome">Brigadeiro Gourmet</div>
        <div class="desc">Chocolate premium</div>
        <div class="preco">R$6</div>
        <a href="https://wa.me/5512991956217">
          <button>Pedir</button>
        </a>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
📞 (12) 99195-6217  
<br><br>
✨ Feito no dia • Entrega rápida
</div>

</body>
</html>
